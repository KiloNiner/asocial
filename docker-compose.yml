services:
  asocial:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_PATH: /data/asocial.db
    volumes:
      - asocial-data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r => process.exit(r.ok ? 0 : 1), () => process.exit(1))",
        ]
      interval: 60s
      timeout: 5s
      retries: 3

volumes:
  asocial-data:
